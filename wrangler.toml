# Cloudflare Workers/Pages Configuration
# Optimized for performance

name = "timorbiz"
compatibility_date = "2026-04-28"
pages_build_output_dir = "./dist/client"

# Workers AI - disable if not used
[ai]
binding = "AI"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "timorbuy"
database_id = "xxx-xxx-xxx"  # Replace with actual D1 ID

# R2 bucket for media (if using)
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "timorbuy-media"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "xxx-xxx-xxx"  # Replace with actual KV ID for caching

# Build settings
build_command = "pnpm build"
compatibility_flags = ["nodejs_compat"]

# Performance optimization
# https://developers.cloudflare.com/workers/configuration-memory-and-computation/
[workers]
# Memory limit: 128MB default, max 300MB
memory_heap_size_division = 1  # Higher precision memory allocation

# Keep idle v8 contexts alive for faster cold starts
persist_across_deploys = true

# Environment-specific settings
[env.production]
# Add production D1/KV IDs here

[env.staging]
# Add staging D1/KV IDs here
