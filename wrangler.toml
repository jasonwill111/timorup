# Cloudflare Workers/Pages Configuration
# Optimized for zero-cost hosting

name = "timorbiz"
compatibility_date = "2024-04-19"
pages_build_output_dir = "./dist/client"

# Workers AI - disable if not used
[ai]
binding = "AI"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "timorbuy"
database_id = "xxx-xxx-xxx"  # Replace with actual D1 ID

# R2 bucket for media (if using)
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "timorbuy-media"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "xxx-xxx-xxx"  # Replace with actual KV ID for caching

# Tail workers - disable for cost savings
# tail_consumers = []

# Observability - disable for cost savings
# [observability]
# enabled = false

# Build settings
build_command = "pnpm build"
compatibility_flags = ["nodejs_compat"]

# Environment-specific settings
[env.production]
# Add production D1/KV IDs here

[env.staging]
# Add staging D1/KV IDs here
