name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://timorup.com
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm build
        env:
          USE_CLOUDFLARE: '1'

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Verify deployment
        run: |
          echo "Verifying deployment..."

          # Check health endpoint
          echo "Checking health endpoint..."
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timorup.com/api/health)
          echo "Health check: $HEALTH_STATUS"

          # Check main page
          echo "Checking main page..."
          MAIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timorup.com)
          echo "Main page: $MAIN_STATUS"

          # Check static assets
          echo "Checking static assets..."
          ASSET_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timorup.com/favicon.ico)
          echo "Static assets: $ASSET_STATUS"

          # Verify all checks pass
          if [ "$MAIN_STATUS" != "200" ]; then
            echo "ERROR: Main page returned $MAIN_STATUS"
            exit 1
          fi

          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "WARNING: Health endpoint returned $HEALTH_STATUS (service may still be starting)"
          fi

          echo "Deployment verification complete!"