name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://timorup.jasonwill.workers.dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm build
        env:
          USE_CLOUDFLARE: '1'

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Verify deployment
        run: |
          echo "Verifying deployment..."

          # Check Workers URL first (primary)
          echo "Checking Workers URL..."
          WORKERS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timorup.jasonwill.workers.dev --max-time 15)
          echo "Workers URL: $WORKERS_STATUS"

          # Check custom domain (may take longer to propagate)
          echo "Checking custom domain..."
          MAIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timorup.com --max-time 15)
          echo "Custom domain: $MAIN_STATUS"

          # Check health endpoint
          echo "Checking health endpoint..."
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timorup.jasonwill.workers.dev/api/health --max-time 15)
          echo "Health check: $HEALTH_STATUS"

          # Verify at least Workers URL passes
          if [ "$WORKERS_STATUS" != "200" ]; then
            echo "ERROR: Workers URL returned $WORKERS_STATUS"
            exit 1
          fi

          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "WARNING: Health endpoint returned $HEALTH_STATUS (service may still be starting)"
          fi

          echo "Deployment verification complete!"