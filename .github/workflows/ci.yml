name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: 版本检查（PR 必须通过，main 可选）
  # ──────────────────────────────────────────────────────────
  version-check:
    name: 版本检查
    runs-on: ubuntu-latest
    # PR 时强制执行，push 到 main 时可选
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, '[skip version-check]') == false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 运行版本检查
        id: version-check
        run: |
          echo "## 📦 依赖版本状态" >> $GITHUB_STEP_SUMMARY
          pnpm outdated 2>&1 | tee /tmp/outdated.txt

          # 统计未升级数量
          COUNT=$(grep "latest" /tmp/outdated.txt | grep -v "^$" | grep -c "" || echo "0")
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "发现 **$COUNT** 个依赖有新版本" >> $GITHUB_STEP_SUMMARY
          echo "outdated_count=$COUNT" >> $GITHUB_OUTPUT

      - name: 提取输出
        id: extract
        run: echo "count=$(grep "latest" /tmp/outdated.txt | grep -v "^$" | grep -c "" || echo "0")" >> $GITHUB_OUTPUT

      - name: 检查结果汇总
        run: |
          COUNT="${{ steps.extract.outputs.count || '0' }}"
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️  有 $COUNT 个依赖可升级，请确认是否需要升级"
            echo "   运行 ./scripts/check-versions.sh --upgrade 自动升级"
            echo "   或在 PR 中添加 '[skip version-check]' 到 commit message 跳过本次检查"
          else
            echo "✅ 所有依赖已是最新"
          fi

  # ──────────────────────────────────────────────────────────
  # Job 2: 构建验证（所有提交必须通过）
  # ──────────────────────────────────────────────────────────
  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy env file
        run: cp .env.example .env || true

      - name: Build for Cloudflare Workers
        run: pnpm build
        env:
          USE_CLOUDFLARE: '1'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Job 3: 类型检查
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit || echo "No tsconfig or typecheck script found, skipping"
