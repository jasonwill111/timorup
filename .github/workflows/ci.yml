name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      # TODO: Fix TypeScript strict mode issues
      # - name: Type check
      #   run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test --run

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      R2_BUCKET_NAME: timorup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm build
        env:
          USE_CLOUDFLARE: '1'